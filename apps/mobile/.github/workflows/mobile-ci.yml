name: Mobile CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

defaults:
  run:
    working-directory: apps/mobile

jobs:
  lint-and-type:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (optional)
        run: |
          if npm run | grep -qE '^\s*lint'; then
            npm run lint
          else
            echo "No lint script defined — skipping."
          fi
        continue-on-error: true

      - name: Typecheck
        run: npx tsc --noEmit

  unit-tests:
    name: Jest unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --runInBand --coverage=false

  parity-guards:
    name: Parity guards (AC-15 / AC-16 / AC-17)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Poll-interval guard (AC-17)
        run: npx tsx scripts/check-poll-intervals.ts

      - name: E2E screen-coverage guard (AC-15)
        run: npx tsx scripts/check-e2e-coverage.ts

      - name: Parity matrix guard (AC-16)
        run: npx tsx scripts/check-parity.ts

  e2e-tests:
    name: Detox e2e (manual)
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build detox target
        run: npm run test:e2e:build

      - name: Run detox specs
        run: npm run test:e2e
